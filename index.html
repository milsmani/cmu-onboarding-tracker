/* Expand § placeholders back to real symbols. */
function un(s){ return s.replace(/§S§/g,'://').replace(/§Q§/g,'?').replace(/§A§/g,'&').replace(/§E§/g,'='); }

/* Parse RAW into the TASKS array. */
const TASKS = RAW.trim().split('\n').filter(Boolean).map(line => {
  const p = line.split('‖');
  const t = { id:p[0], sec:p[1], title:un(p[2]), dl:p[3], dlL:un(p[4]||''), url:un(p[5]||''), cons:un(p[7]||''), c:p[8]||'' };
  if (p[6]) t.steps = p[6].split('¦').map(un);
  return t;
});

const KEY = 'cmu-bdes-tracker-2030-final';
let state = {};
let curSection = 'apr';
let fState = 'all';
let fSearch = '';
let saveTimer;

// Shared backend (Cloudflare Pages Function + KV). Falls back to this-browser-only
// storage when the API isn't reachable (e.g. opening the file directly off disk).
const API = '/api/progress';
let apiOk = null; // null = unknown, true = shared sync working, false = local only

async function load() {
  try {
    const r = await fetch(API, { cache: 'no-store' });
    if (!r.ok) throw new Error('http ' + r.status);
    const data = await r.json();
    state = (data && typeof data === 'object') ? data : {};
    apiOk = true;
    sync('Synced — shared across all devices');
  } catch (e) {
    apiOk = false;
    try { const raw = localStorage.getItem(KEY); if (raw) state = JSON.parse(raw); } catch (_) {}
    sync('This browser only — shared sync unavailable');
  }
  render();
}

function save() {
  sync('Saving…', 'save');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    try { localStorage.setItem(KEY, JSON.stringify(state)); } catch (_) {}
    try {
      const r = await fetch(API, {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify(state)
      });
      if (!r.ok) throw new Error('http ' + r.status);
      apiOk = true;
      sync('Synced — visible on all devices');
    } catch (e) {
      apiOk = false;
      sync('Saved to this browser only', 'err');
    }
  }, 400);
}

// Keep open tabs roughly in sync: pull the shared state periodically and re-render
// if it changed (and we're not mid-save).
setInterval(async () => {
  if (apiOk === false || saveTimer) return;
  try {
    const r = await fetch(API, { cache: 'no-store' });
    if (!r.ok) return;
    const data = await r.json();
    if (data && typeof data === 'object' && JSON.stringify(data) !== JSON.stringify(state)) {
      state = data;
      render();
    }
  } catch (_) {}
}, 20000);

function sync(msg, cls) {
  const el = document.getElementById('sync');
  el.textContent = msg;
  el.className = 'sync' + (cls ? ' ' + cls : '');
}

function getS(id) { return state[id] || 'notstarted'; }
function setS(id, s) {
  if (s === 'notstarted') delete state[id];
  else state[id] = s;
  save();
  render();
}
function cycle(id) {
  const c = getS(id);
  setS(id, c === 'notstarted' ? 'reviewed' : c === 'reviewed' ? 'done' : 'notstarted');
}

function daysTo(d) {
  const today = new Date();
  today.setHours(0,0,0,0);
  return Math.ceil((new Date(d) - today) / 86400000);
}

function urgency(d) {
  const n = daysTo(d);
  if (n < 0) return '';
  if (n <= 7) return 'u-red';
  if (n <= 30) return 'u-org';
  if (n <= 60) return 'u-yel';
  return '';
}

function matchesSearch(t) {
  if (!fSearch) return true;
  const q = fSearch.toLowerCase();
  if (t.title.toLowerCase().includes(q)) return true;
  if (t.dlL && t.dlL.toLowerCase().includes(q)) return true;
  if (t.url && t.url.toLowerCase().includes(q)) return true;
  if (t.cons && t.cons.toLowerCase().includes(q)) return true;
  if (t.c && t.c.toLowerCase().includes(q)) return true;
  if (t.steps && t.steps.some(s => s.toLowerCase().includes(q))) return true;
  return false;
}

function matches(t) {
  if (fState !== 'all' && getS(t.id) !== fState) return false;
  if (!matchesSearch(t)) return false;
  return true;
}

function render() {
  const total = TASKS.length;
  const rev = TASKS.filter(t => { const s = getS(t.id); return s === 'reviewed' || s === 'done'; }).length;
  const dn = TASKS.filter(t => getS(t.id) === 'done').length;
  document.getElementById('rc').textContent = rev + ' / ' + total;
  document.getElementById('dc').textContent = dn + ' / ' + total;
  document.getElementById('rb').style.width = (rev/total*100) + '%';
  document.getElementById('db').style.width = (dn/total*100) + '%';

  const urgent = TASKS.filter(t => { const n = daysTo(t.dl); return n >= 0 && n <= 7 && getS(t.id) !== 'done'; }).sort((a,b) => daysTo(a.dl) - daysTo(b.dl));
  const ub = document.getElementById('urgent');
  const ul = document.getElementById('urgent-list');
  if (urgent.length === 0) ub.classList.add('empty');
  else {
    ub.classList.remove('empty');
    ul.innerHTML = urgent.slice(0,5).map(t => {
      const n = daysTo(t.dl);
      const lbl = n === 0 ? 'TODAY' : n === 1 ? 'TOMORROW' : n + ' days';
      return '<div class="uitem"><b>' + lbl + ':</b>' + t.title + '</div>';
    }).join('');
  }

  const tabs = document.getElementById('tabs');
  const searchStatus = document.getElementById('search-status');
  const clearBtn = document.getElementById('search-clear');
  if (fSearch) {
    const totalMatches = TASKS.filter(matches).length;
    const sectionsWithHits = SECTIONS.filter(s => TASKS.some(t => t.sec === s.id && matches(t))).length;
    searchStatus.style.display = 'block';
    searchStatus.textContent = 'Found ' + totalMatches + ' task' + (totalMatches !== 1 ? 's' : '') + ' matching "' + fSearch + '" across ' + sectionsWithHits + ' section' + (sectionsWithHits !== 1 ? 's' : '');
    clearBtn.style.display = 'flex';
  } else {
    searchStatus.style.display = 'none';
    clearBtn.style.display = 'none';
  }

  tabs.innerHTML = SECTIONS.map(s => {
    const n = TASKS.filter(t => t.sec === s.id && matches(t)).length;
    return '<button class="tab' + (s.id === curSection ? ' on' : '') + '" data-s="' + s.id + '">' + s.label + ' <span class="tcnt">' + n + '</span></button>';
  }).join('');
  tabs.querySelectorAll('.tab').forEach(b => b.addEventListener('click', () => { curSection = b.dataset.s; render(); }));

  const c = document.getElementById('sections');
  // When searching, show ALL sections with matches (not just current tab)
  // When not searching, show only the current tab
  c.innerHTML = SECTIONS.map(s => {
    const list = TASKS.filter(t => t.sec === s.id && matches(t));
    const shouldShow = fSearch ? list.length > 0 : s.id === curSection;
    return '<div class="sec' + (shouldShow ? ' on' : '') + '">'
      + '<div class="shdr"><h2>' + s.label + '</h2><p>' + s.desc + ' · ' + list.length + ' task' + (list.length !== 1 ? 's' : '') + '</p></div>'
      + (list.length === 0 ? '<div class="empty">No tasks match the current filter</div>' : list.map(renderTask).join(''))
      + '</div>';
  }).join('');

  c.querySelectorAll('.tog').forEach(b => b.addEventListener('click', e => { e.stopPropagation(); cycle(b.dataset.id); }));
  c.querySelectorAll('.thdr').forEach(h => h.addEventListener('click', e => { if (e.target.closest('.tog')) return; h.closest('.task').classList.toggle('open'); }));
  c.querySelectorAll('.sbtn').forEach(b => b.addEventListener('click', e => { e.stopPropagation(); setS(b.dataset.id, b.dataset.s); }));
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function highlight(s) {
  const escaped = escapeHtml(s);
  if (!fSearch) return escaped;
  const q = fSearch.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const re = new RegExp('(' + q + ')', 'gi');
  return escaped.replace(re, '<mark>$1</mark>');
}

function renderTask(t) {
  const s = getS(t.id);
  const u = urgency(t.dl);
  const n = daysTo(t.dl);
  const urg = n >= 0 && n <= 7;
  const icon = s === 'reviewed' ? '👁' : s === 'done' ? '✓' : '';
  const togCls = s === 'reviewed' ? 's-rev' : s === 'done' ? 's-dn' : '';

  let html = '<div class="task ' + u + ' s-' + s + '">'
    + '<div class="thdr">'
    + '<button class="tog ' + togCls + '" data-id="' + t.id + '" title="Click to cycle: Not started → Reviewed → Done">' + icon + '</button>'
    + '<div class="tbod">'
    + '<div class="ttl">' + highlight(t.title) + '</div>'
    + '<div class="tmeta">'
    + '<span class="bdg dl' + (urg ? ' urg' : '') + '">' + escapeHtml(t.dlL || t.dl) + '</span>'
    + '</div></div>'
    + '<div class="caret">›</div>'
    + '</div>'
    + '<div class="det">';

  if (t.url) html += '<div class="dsec"><div class="dlbl">Link</div><div class="dcnt"><a href="' + escapeHtml(t.url) + '" target="_blank" rel="noopener">' + highlight(t.url) + '</a></div></div>';
  if (t.steps) html += '<div class="dsec"><div class="dlbl">Steps</div><div class="dcnt"><ol>' + t.steps.map(x => '<li>' + highlight(x) + '</li>').join('') + '</ol></div></div>';
  if (t.cons) html += '<div class="dsec"><div class="dlbl">If Missed</div><div class="dcnt">' + highlight(t.cons) + '</div></div>';
  if (t.c) html += '<div class="dsec"><div class="dlbl">Contact</div><div class="dcnt">' + highlight(t.c) + '</div></div>';

  html += '<div class="sctrl">'
    + '<button class="sbtn' + (s === 'notstarted' ? ' on' : '') + '" data-id="' + t.id + '" data-s="notstarted">⬜ Not Started</button>'
    + '<button class="sbtn' + (s === 'reviewed' ? ' on-rev' : '') + '" data-id="' + t.id + '" data-s="reviewed">👁 Reviewed</button>'
    + '<button class="sbtn' + (s === 'done' ? ' on-dn' : '') + '" data-id="' + t.id + '" data-s="done">✅ Done</button>'
    + '</div></div></div>';

  return html;
}

document.querySelectorAll('.fbtn').forEach(b => b.addEventListener('click', () => {
  document.querySelectorAll('.fbtn[data-stf]').forEach(x => x.classList.remove('on'));
  b.classList.add('on');
  fState = b.dataset.stf;
  render();
}));

// Search input handler with debounce
let searchTimer;
document.getElementById('search').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    fSearch = e.target.value.trim();
    render();
  }, 150);
});

// Clear search button
document.getElementById('search-clear').addEventListener('click', () => {
  document.getElementById('search').value = '';
  fSearch = '';
  render();
  document.getElementById('search').focus();
});

// Escape key to clear search
document.getElementById('search').addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.getElementById('search').value = '';
    fSearch = '';
    render();
  }
});

load();
</script>
